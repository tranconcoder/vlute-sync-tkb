services:
  redis-server:
    image: redis:alpine
    container_name: vlute-sync-redis
    restart: always

  mongodb:
    image: mongo:7
    container_name: vlute-sync-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: vlute-sync

  vlute-sync-tkb-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vlute-sync-tkb-ui
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    depends_on:
      - vlute-sync-tkb-api

  vlute-sync-tkb-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: vlute-sync-tkb-api
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis-server:6379/0}
      - MONGO_URL=${MONGO_URL:-mongodb://mongodb:27017/vlute-sync}
    depends_on:
      - redis-server
      - mongodb
